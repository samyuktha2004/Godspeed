services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Container DNS — services reach each other by their compose name
      PORT: "8000"
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      # Local-dev auth: enable demo creds, allow HTTP cookies
      ALLOW_DEMO_AUTH: "true"
      COOKIE_SAMESITE: lax
      COOKIE_SECURE: "false"
      # Frontend is served by the same FastAPI app — same-origin, no CORS gymnastics
      CORS_ORIGINS: http://localhost:8000
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy

  worker:
    build: .
    command: celery -A ingestion.jobs.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      CELERY_CONCURRENCY: "2"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  qdrant_data:
  neo4j_data:
